server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: kitchen-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthos}
    username: ${SPRING_DATASOURCE_USERNAME:healthos}
    password: ${SPRING_DATASOURCE_PASSWORD:healthos}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    # Shares the healthos DB with user-management, so use a dedicated history table.
    table: flyway_schema_history_kitchen
    baseline-on-migrate: true
    locations: classpath:db/migration

healthos:
  security:
    jwt:
      issuer: ${JWT_ISSUER:healthos}
      secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me}
  downstream:
    user-management:
      base-url: ${USER_MGMT_BASE_URL:http://localhost:8081}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
