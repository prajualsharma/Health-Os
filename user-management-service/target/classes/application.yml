server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-management-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthos}
    username: ${SPRING_DATASOURCE_USERNAME:healthos}
    password: ${SPRING_DATASOURCE_PASSWORD:healthos}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

healthos:
  security:
    jwt:
      issuer: ${JWT_ISSUER:healthos}
      consumer-issuer: ${JWT_CONSUMER_ISSUER:healthos-consumer}
      staff-issuer: ${JWT_STAFF_ISSUER:healthos-staff}
      secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me}
      access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:900}
      refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:2592000} # 30 days
  otp:
    dev-code: ${DEV_OTP_CODE:123456}
    ttl-seconds: ${OTP_TTL_SECONDS:600}
    length: ${OTP_LENGTH:6}
    dev-bypass: ${OTP_DEV_BYPASS:true}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
    registration-ttl-seconds: ${OTP_REGISTRATION_TTL_SECONDS:900}
    consumer-rate-limit-per-hour: ${OTP_CONSUMER_RATE_LIMIT_PER_HOUR:10}
  consumer-scale:
    # Split consumer-identity-service when NutriKit MAU exceeds split-mau-threshold and DB is saturated.
    split-mau-threshold: ${CONSUMER_SPLIT_MAU_THRESHOLD:500000}
    read-replica-enabled: ${CONSUMER_READ_REPLICA_ENABLED:false}
    read-replica-url: ${CONSUMER_READ_REPLICA_URL:}
  notification:
    enabled: ${NOTIFICATION_ENABLED:false}
    base-url: ${NOTIFICATION_BASE_URL:http://localhost:8082}
    tenant-id: ${NOTIFICATION_TENANT_ID:healthos}
    otp-email-to: ${OTP_EMAIL_TO:}
  kafka:
    enabled: ${KAFKA_NOTIFICATIONS_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topic: ${NOTIFICATION_TOPIC:notification-topic}
  onboarding-reminder:
    delay-minutes: ${ONBOARDING_REMINDER_DELAY_MINUTES:120}
    resume-base-url: ${NUTRIKIT_RESUME_BASE_URL:https://nutrikit.vercel.app}
    poll-interval-ms: ${ONBOARDING_REMINDER_POLL_MS:300000}
  smtp:
    enabled: ${SMTP_ENABLED:true}
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${SMTP_FROM:${SMTP_USERNAME:}}
    starttls: ${SMTP_STARTTLS:true}
    otp-subject: ${SMTP_OTP_SUBJECT:Your NutriKit verification code}
    otp-body: ${SMTP_OTP_BODY:Your NutriKit verification code for {{phone}} is {{otp}}. It expires in 10 minutes.}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

