name: CD

# CI runs on PR/push; this workflow deploys to the Oracle/EC2 VM after CI passes.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   VM_SSH_KEY   — private SSH key (PEM) for the VM
#   VM_HOST      — public IP or hostname (e.g. 152.67.28.189)
#   VM_USER      — SSH user (optional, defaults to ubuntu)
#   JWT_SECRET   — 32+ char signing secret (persist across deploys)
#
# Optional secrets:
#   SMTP_PASSWORD, OTP_EMAIL_TO — real OTP email in minimal/full stacks
#   VERCEL_TOKEN                — when DEPLOY_VERCEL repo variable is true
#
# Legacy secret names EC2_SSH_KEY / EC2_HOST / EC2_USER are still accepted.
#
# Repository variable (optional):
#   ORACLE_STACK — dev (default) | minimal | full
#   DEPLOY_VERCEL — true to deploy Vercel frontends after VM deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      oracle_stack:
        description: Backend stack profile
        type: choice
        options:
          - dev
          - minimal
          - full
        default: dev
      reset_db:
        description: Wipe Postgres/Mongo volumes before deploy (destructive)
        type: boolean
        default: false

concurrency:
  group: deploy-vm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-vm:
    name: Deploy to VM
    needs: ci
    runs-on: ubuntu-latest
    env:
      ORACLE_STACK: ${{ github.event.inputs.oracle_stack || vars.ORACLE_STACK || 'dev' }}
      RESET_DB: ${{ github.event.inputs.reset_db == true && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy credentials
        id: creds
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          KEY="${VM_SSH_KEY:-$EC2_SSH_KEY}"
          HOST="${VM_HOST:-$EC2_HOST}"
          USER="${VM_USER:-${EC2_USER:-ubuntu}}"
          if [[ -z "$KEY" || -z "$HOST" ]]; then
            echo "::error::Set VM_SSH_KEY + VM_HOST (or EC2_SSH_KEY + EC2_HOST) in repository secrets."
            exit 1
          fi
          echo "user=$USER" >> "$GITHUB_OUTPUT"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$KEY" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem

      - name: Sync repo to VM
        run: |
          TARGET="${{ steps.creds.outputs.user }}@${{ steps.creds.outputs.host }}"
          ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=accept-new "$TARGET" 'mkdir -p ~/healthos'
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=accept-new" \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '**/build/' \
            --exclude '**/target/' \
            --exclude '**/.dart_tool/' \
            --exclude '**/node_modules/' \
            --exclude '**/.vercel/' \
            --exclude 'deploy/oracle-host.env' \
            --exclude 'deploy/oracle-create.log' \
            --exclude 'deploy/oracle-deploy.log' \
            ./ "${TARGET}:~/healthos/"

      - name: Build and restart stack on VM
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OTP_EMAIL_TO: ${{ secrets.OTP_EMAIL_TO }}
        run: |
          TARGET="${{ steps.creds.outputs.user }}@${{ steps.creds.outputs.host }}"
          ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=accept-new "$TARGET" \
            "ORACLE_STACK=${ORACLE_STACK} RESET_DB=${RESET_DB} \
             JWT_SECRET=$(printf '%q' "${JWT_SECRET:-}") \
             SMTP_PASSWORD=$(printf '%q' "${SMTP_PASSWORD:-}") \
             OTP_EMAIL_TO=$(printf '%q' "${OTP_EMAIL_TO:-}") \
             bash ~/healthos/deploy/ci-remote-deploy.sh"

      - name: Smoke test API gateway
        run: |
          HOST="${{ steps.creds.outputs.host }}"
          for i in $(seq 1 24); do
            if curl -sf "http://${HOST}:8080/actuator/health" | grep -q UP; then
              echo "api-gateway is UP at http://${HOST}:8080"
              exit 0
            fi
            sleep 5
          done
          echo "::error::api-gateway did not become healthy"
          exit 1

      - name: Smoke test NutriKit auth (dev stack)
        if: env.ORACLE_STACK == 'dev'
        run: |
          HOST="${{ steps.creds.outputs.host }}"
          curl -sf -X POST "http://${HOST}:8080/auth/nutrikit/phone/initiate" \
            -H 'Content-Type: application/json' \
            -d '{"phone":"+919999999999","clientId":"nutrikit"}' \
            | grep -q '"otpSent":true'

  deploy-vercel-api:
    name: Deploy API proxy (Vercel)
    needs: deploy-vm
    runs-on: ubuntu-latest
    if: vars.DEPLOY_VERCEL == 'true'
    defaults:
      run:
        working-directory: deploy/vercel-api
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@54

      - name: Deploy healthos-api
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"

  deploy-nutrikit:
    name: Deploy NutriKit (Vercel)
    needs: deploy-vm
    runs-on: ubuntu-latest
    if: vars.DEPLOY_VERCEL == 'true'
    defaults:
      run:
        working-directory: nutrikit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build web
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=API_URL=https://healthos-api.vercel.app \
            --dart-define=USE_MOCK=true \
            --dart-define=MOCK_AUTH=false

      - name: Stage prebuilt output
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -r build/web/* .vercel/output/static/
          printf '%s\n' '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' \
            > .vercel/output/config.json

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
