name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-management-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and test
        working-directory: ${{ matrix.service }}
        run: mvn -B verify -DskipTests=false

  go:
    name: Go services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg/healthos
          - kitchen-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            pkg/healthos/go.sum
            kitchen-service/go.sum
            notification-service/go.sum

      - name: Test and build
        working-directory: ${{ matrix.module }}
        run: |
          go test ./...
          if [ -d cmd/server ]; then
            go build -buildvcs=false -o /dev/null ./cmd/server
          fi

  nutrikit:
    name: NutriKit (analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nutrikit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
