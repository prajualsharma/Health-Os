server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        - id: user_mgmt_auth_nutrikit
          uri: ${USER_MGMT_BASE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/nutrikit/**,/me/nutrikit/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        - id: user_mgmt_auth_staff
          uri: ${USER_MGMT_BASE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/staff/**,/me/staff/**,/scoped-memberships/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        - id: user_mgmt_auth
          uri: ${USER_MGMT_BASE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**,/me/**,/admin/**,/internal/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        - id: kitchen_service
          uri: ${KITCHEN_BASE_URL:http://localhost:8083}
          predicates:
            - Path=/kitchen/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        - id: user_mgmt_docs
          uri: ${USER_MGMT_BASE_URL:http://localhost:8081}
          predicates:
            - Path=/docs/user-management/**
          filters:
            - RewritePath=/docs/user-management/(?<segment>.*), /${segment}

healthos:
  security:
    jwt:
      issuer: ${JWT_ISSUER:healthos}
      secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me}
      access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:900}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}

  downstream:
    user-management:
      base-url: ${USER_MGMT_BASE_URL:http://localhost:8081}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

  rate-limit:
    replenish-rate: ${RATE_LIMIT_REPLENISH_RATE:20}
    burst-capacity: ${RATE_LIMIT_BURST_CAPACITY:40}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-management-service
        url: /docs/user-management/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus