server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/healthos_notifications}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.healthos.notification.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}

healthos:
  security:
    jwt:
      issuer: ${JWT_ISSUER:healthos}
      secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me}
      access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:900}
  notification:
    topics:
      main: ${NOTIFICATION_TOPIC:notification-topic}
      retry: ${NOTIFICATION_RETRY_TOPIC:notification-retry}
      dlt: ${NOTIFICATION_DLT_TOPIC:notification-dlt}
    idempotency-ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:86400}
    rate-limit:
      max-per-window: ${RATE_LIMIT_MAX:100}
      window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  whatsapp:
    enabled: ${META_WHATSAPP_ENABLED:false}
    api-url: ${META_WHATSAPP_API_URL:https://graph.facebook.com/v21.0}
    phone-number-id: ${META_WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${META_WHATSAPP_TOKEN:}
    otp-message-template: ${META_WHATSAPP_OTP_TEMPLATE:Your NutriKit verification code is {{otp}}. It expires in 10 minutes.}
  smtp:
    enabled: ${SMTP_ENABLED:true}
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${SMTP_FROM:${SMTP_USERNAME:}}
    starttls: ${SMTP_STARTTLS:true}
    otp-subject-template: ${SMTP_OTP_SUBJECT:Your NutriKit verification code}
    otp-body-template: ${SMTP_OTP_BODY:Your NutriKit verification code for {{phone}} is {{otp}}. It expires in 10 minutes.}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-},%X{eventId:-},%X{tenantId:-}]"
