spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
  data:
    mongodb:
      uri: ${spring.data.mongodb.uri:mongodb://localhost:27017/healthos_notifications_test}
    redis:
      host: localhost
      port: 6379

healthos:
  security:
    jwt:
      issuer: healthos
      secret: test-secret-test-secret-test-secret-test-secret
  notification:
    idempotency-ttl-seconds: 60
    rate-limit:
      max-per-window: 1000
      window-seconds: 60

management:
  tracing:
    sampling:
      probability: 0.0
