server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip for the Flutter web bundle.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;

    # --- Bind frontend -> backend ---------------------------------------
    # Every backend route the gateway owns is reverse-proxied to it, so the
    # Flutter app can call the API same-origin (no CORS, no hardcoded host/IP).
    location ~ ^/(auth|me|admin|internal|docs|swagger-ui|swagger-ui.html|v3|webjars|actuator|oauth2|login)(/|$|\.) {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # --- Single Page App fallback ---------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
