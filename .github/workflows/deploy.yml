name: Deploy HealthOS to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-vm:
    name: Deploy to VM (Oracle or EC2)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem

      - name: Sync repo to VM
        env:
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_USER: ${{ secrets.EC2_USER }}
        run: |
          HOST="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=accept-new "$HOST" 'mkdir -p ~/healthos'
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=accept-new" \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '**/build/' \
            --exclude '**/target/' \
            --exclude '**/.dart_tool/' \
            --exclude '**/node_modules/' \
            --exclude '**/.vercel/' \
            --exclude 'deploy/oracle-host.env' \
            ./ "${HOST}:~/healthos/"

      - name: Build and restart stack on VM
        env:
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_USER: ${{ secrets.EC2_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OTP_EMAIL_TO: ${{ secrets.OTP_EMAIL_TO }}
        run: |
          HOST="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=accept-new "$HOST" bash -s <<REMOTE
          set -euo pipefail
          cd ~/healthos

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          upsert_env() {
            local key="\$1" val="\$2"
            if grep -q "^\${key}=" .env; then
              sed -i "s|^\${key}=.*|\${key}=\${val}|" .env
            else
              echo "\${key}=\${val}" >> .env
            fi
          }

          upsert_env JWT_SECRET "${JWT_SECRET}"
          upsert_env NOTIFICATION_ENABLED "true"
          upsert_env OTP_EMAIL_TO "${OTP_EMAIL_TO:-prajual.sharma.1559@gmail.com}"
          upsert_env SMTP_HOST "smtp.gmail.com"
          upsert_env SMTP_PORT "587"
          upsert_env SMTP_USERNAME "${OTP_EMAIL_TO:-prajual.sharma.1559@gmail.com}"
          upsert_env SMTP_FROM "${OTP_EMAIL_TO:-prajual.sharma.1559@gmail.com}"
          upsert_env SMTP_ENABLED "true"
          if [ -n "${SMTP_PASSWORD}" ]; then
            upsert_env SMTP_PASSWORD "${SMTP_PASSWORD}"
            upsert_env OTP_DEV_BYPASS "false"
          else
            echo "::warning::SMTP_PASSWORD secret not set — keeping OTP_DEV_BYPASS=true"
            upsert_env OTP_DEV_BYPASS "true"
          fi

          COMPOSE="docker compose -f docker-compose.yml \
            -f deploy/docker-compose.backend.yml \
            -f deploy/docker-compose.ec2-email.yml \
            -f deploy/docker-compose.ec2-minimal.yml"

          sudo \$COMPOSE up -d --build \
            postgres redis user-management-service api-gateway

          for i in \$(seq 1 36); do
            if curl -sf http://localhost:8080/actuator/health | grep -q UP; then
              echo "api-gateway is UP"
              exit 0
            fi
            sleep 5
          done
          echo "WARNING: api-gateway not healthy yet"
          sudo \$COMPOSE ps
          REMOTE

      - name: Smoke test
        env:
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
        run: |
          curl -sf "http://${DEPLOY_HOST}:8080/actuator/health" | grep -q UP || \
            echo "Note: port 8080 may be blocked by VCN/security group; check Oracle ingress rules."

  deploy-vercel-api:
    name: Deploy API proxy (Vercel)
    needs: deploy-vm
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_VERCEL == 'true' }}
    defaults:
      run:
        working-directory: deploy/vercel-api
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@54

      - name: Deploy healthos-api
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"

  deploy-nutrikit:
    name: Deploy NutriKit (Vercel)
    needs: deploy-vm
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_VERCEL == 'true' }}
    defaults:
      run:
        working-directory: nutrikit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build web
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=API_URL=https://healthos-api.vercel.app \
            --dart-define=USE_MOCK=true \
            --dart-define=MOCK_AUTH=false

      - name: Stage prebuilt output
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -r build/web/* .vercel/output/static/
          printf '%s\n' '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' \
            > .vercel/output/config.json

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
