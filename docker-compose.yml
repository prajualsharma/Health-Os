# HealthOS - full stack in one Compose project.
#
# Brings up datastores (Postgres, MongoDB, Redis, Kafka), all three Spring Boot
# services (api-gateway, user-management-service, notification-service) and the
# Flutter web frontend (served by nginx, reverse-proxying the API). Everything
# runs on a single host / VM and talks over the private `healthos` network.
#
#   cp .env.example .env      # then edit JWT_SECRET
#   docker compose up -d --build
#
# Frontend:  http://<host>/         (Flutter web)
# Gateway:   http://<host>/auth/... (proxied through the web container)
# Swagger:   http://<host>/swagger-ui.html

name: healthos

services:
  # ---------------------------------------------------------------- datastores
  postgres:
    image: postgres:16
    container_name: healthos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthos}
      POSTGRES_USER: ${POSTGRES_USER:-healthos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [healthos]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthos} -d ${POSTGRES_DB:-healthos}"]
      interval: 5s
      timeout: 3s
      retries: 30

  mongo:
    image: mongo:7
    container_name: healthos-mongo
    volumes:
      - mongodata:/data/db
    networks: [healthos]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: healthos-redis
    networks: [healthos]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  kafka:
    image: apache/kafka:3.7.0
    container_name: healthos-kafka
    networks: [healthos]
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30

  # ------------------------------------------------------------------ services
  user-management-service:
    build:
      context: ./user-management-service
      dockerfile: Dockerfile
    container_name: healthos-user-management-service
    networks: [healthos]
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-healthos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-healthos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-healthos}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: ${JWT_ISSUER:-healthos}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 2592000
      DEV_OTP_CODE: ${DEV_OTP_CODE:-123456}
      OTP_TTL_SECONDS: 600
      OTP_LENGTH: 6
      OTP_DEV_BYPASS: ${OTP_DEV_BYPASS:-true}
      NOTIFICATION_ENABLED: ${NOTIFICATION_ENABLED:-false}
      NOTIFICATION_BASE_URL: http://notification-service:8082
      OTP_EMAIL_TO: ${OTP_EMAIL_TO:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-${SMTP_USERNAME:-}}
      SMTP_ENABLED: ${SMTP_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: healthos-notification-service
    networks: [healthos]
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/healthos_notifications
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_ISSUER: ${JWT_ISSUER:-healthos}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      NOTIFICATION_TOPIC: notification-topic
      NOTIFICATION_RETRY_TOPIC: notification-retry
      NOTIFICATION_DLT_TOPIC: notification-dlt
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-${SMTP_USERNAME:-}}
      SMTP_ENABLED: ${SMTP_ENABLED:-true}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30

  kitchen-service:
    build:
      context: ./kitchen-service
      dockerfile: Dockerfile
    container_name: healthos-kitchen-service
    networks: [healthos]
    restart: unless-stopped
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-healthos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-healthos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-healthos}
      JWT_ISSUER: ${JWT_ISSUER:-healthos}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      USER_MGMT_BASE_URL: http://user-management-service:8081
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: healthos-api-gateway
    networks: [healthos]
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: ${JWT_ISSUER:-healthos}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ACCESS_TOKEN_TTL_SECONDS: 900
      USER_MGMT_BASE_URL: http://user-management-service:8081
      KITCHEN_BASE_URL: http://kitchen-service:8083
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      RATE_LIMIT_REPLENISH_RATE: 20
      RATE_LIMIT_BURST_CAPACITY: 40
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      redis:
        condition: service_healthy
      user-management-service:
        condition: service_healthy
      kitchen-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ------------------------------------------------------------------ frontend
  web:
    build:
      context: ./healthos_flutter
      dockerfile: Dockerfile
      args:
        # Empty -> Flutter app calls the API same-origin; nginx proxies it to
        # the gateway. Override only if you serve the API on a separate host.
        API_URL: ${FRONTEND_API_URL:-}
        USE_MOCK: ${FRONTEND_USE_MOCK:-false}
    container_name: healthos-web
    networks: [healthos]
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api-gateway:
        condition: service_healthy

networks:
  healthos:
    driver: bridge

volumes:
  pgdata:
  mongodata:
